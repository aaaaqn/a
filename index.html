<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>かわいい迷路ゲーム</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#ffeef4;
text-align:center;
color:#444;
}

h1{
margin-top:10px;
color:#ff6fa5;
}

#ui{
margin:10px;
font-size:18px;
}

#maze{
display:grid;
justify-content:center;
margin:20px auto;
}

.cell{
width:30px;
height:30px;
border-radius:4px;
}

.wall{
background:#7c8cff;
}

.path{
background:#ffffff;
}

.player{
background:#ff6fa5;
}

.goal{
background:#6ee7b7;
}

.coin{
background:#ffd166;
border-radius:50%;
}

button{
font-size:20px;
padding:10px 18px;
margin:6px;
border:none;
border-radius:10px;
background:#ff9ecb;
color:white;
}

button:active{
transform:scale(0.9);
}

#controls{
margin-top:10px;
}

</style>
</head>

<body>

<h1>🌸 かわいい迷路ゲーム 🌸</h1>

<div id="ui">
ステージ: <span id="stage">1</span>　
コイン: <span id="coins">0</span>　
時間: <span id="time">0</span>
</div>

<div id="maze"></div>

<div id="controls">
<div>
<button onclick="move(0,-1)">↑</button>
</div>
<div>
<button onclick="move(-1,0)">←</button>
<button onclick="move(0,1)">↓</button>
<button onclick="move(1,0)">→</button>
</div>
</div>

<script>

let stage=1
let size=13
let maze=[]
let player={x:1,y:1}
let goal={x:0,y:0}
let coins=[]
let collected=0
let time=0

const mazeDiv=document.getElementById("maze")

setInterval(()=>{
time++
document.getElementById("time").textContent=time
},1000)

function generateMaze(){

size=13+stage*2

maze=[]

for(let y=0;y<size;y++){
maze[y]=[]
for(let x=0;x<size;x++){
maze[y][x]=1
}
}

function carve(x,y){

const dirs=[[2,0],[-2,0],[0,2],[0,-2]]
dirs.sort(()=>Math.random()-0.5)

for(let [dx,dy] of dirs){

let nx=x+dx
let ny=y+dy

if(nx>0 && ny>0 && nx<size-1 && ny<size-1 && maze[ny][nx]===1){

maze[y+dy/2][x+dx/2]=0
maze[ny][nx]=0
carve(nx,ny)

}

}

}

maze[1][1]=0
carve(1,1)

player={x:1,y:1}
goal={x:size-2,y:size-2}

coins=[]

for(let i=0;i<stage+2;i++){

let cx,cy

do{
cx=Math.floor(Math.random()*size)
cy=Math.floor(Math.random()*size)
}while(maze[cy][cx]!==0)

coins.push({x:cx,y:cy})

}

}

function drawMaze(){

mazeDiv.style.gridTemplateColumns=`repeat(${size},30px)`
mazeDiv.innerHTML=""

for(let y=0;y<size;y++){
for(let x=0;x<size;x++){

let cell=document.createElement("div")
cell.classList.add("cell")

if(maze[y][x]===1) cell.classList.add("wall")
else cell.classList.add("path")

if(player.x===x && player.y===y) cell.classList.add("player")

if(goal.x===x && goal.y===y) cell.classList.add("goal")

for(let c of coins){
if(c.x===x && c.y===y){
cell.classList.add("coin")
}
}

mazeDiv.appendChild(cell)

}
}

}

function move(dx,dy){

let nx=player.x+dx
let ny=player.y+dy

if(nx>=0 && ny>=0 && nx<size && ny<size){

if(maze[ny][nx]===0){

player.x=nx
player.y=ny

for(let i=0;i<coins.length;i++){
if(coins[i].x===nx && coins[i].y===ny){

coins.splice(i,1)
collected++
document.getElementById("coins").textContent=collected

}
}

if(player.x===goal.x && player.y===goal.y){

stage++
document.getElementById("stage").textContent=stage

generateMaze()

}

drawMaze()

}

}

}

document.addEventListener("keydown",e=>{

if(e.key==="ArrowUp") move(0,-1)
if(e.key==="ArrowDown") move(0,1)
if(e.key==="ArrowLeft") move(-1,0)
if(e.key==="ArrowRight") move(1,0)

})

generateMaze()
drawMaze()

</script>

</body>
</html>
