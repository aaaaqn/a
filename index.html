<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ランダム迷路ゲーム</title>

<style>

body{
font-family:sans-serif;
text-align:center;
background:#f0f0f0;
margin:0;
}

h1{
margin:10px;
}

#info{
margin:10px;
font-size:18px;
}

#maze{
display:grid;
justify-content:center;
margin:10px auto;
}

.cell{
width:32px;
height:32px;
border:1px solid #ddd;
}

.wall{background:#222;}
.path{background:white;}
.player{background:#3fa9ff;}
.goal{background:#4caf50;}

#controls{
margin-top:15px;
}

button{
font-size:20px;
padding:10px 20px;
margin:5px;
}

</style>
</head>

<body>

<h1>迷路ゲーム</h1>
<div id="info">ステージ: <span id="stage">1</span></div>

<div id="maze"></div>

<div id="controls">
<div>
<button onclick="move(0,-1)">↑</button>
</div>
<div>
<button onclick="move(-1,0)">←</button>
<button onclick="move(0,1)">↓</button>
<button onclick="move(1,0)">→</button>
</div>
</div>

<script>

let stage=1
let size=11
let maze=[]
let player={x:1,y:1}
let goal={x:0,y:0}

const mazeDiv=document.getElementById("maze")

function generateMaze(){

size=11+stage*2
if(size%2===0) size++

maze=[]

for(let y=0;y<size;y++){
maze[y]=[]
for(let x=0;x<size;x++){
maze[y][x]=1
}
}

function carve(x,y){

const dirs=[[2,0],[-2,0],[0,2],[0,-2]]

dirs.sort(()=>Math.random()-0.5)

for(let [dx,dy] of dirs){

let nx=x+dx
let ny=y+dy

if(nx>0 && ny>0 && nx<size-1 && ny<size-1 && maze[ny][nx]===1){

maze[y+dy/2][x+dx/2]=0
maze[ny][nx]=0

carve(nx,ny)

}

}

}

maze[1][1]=0
carve(1,1)

player={x:1,y:1}
goal={x:size-2,y:size-2}

maze[goal.y][goal.x]=0

}

function drawMaze(){

mazeDiv.style.gridTemplateColumns=`repeat(${size},32px)`
mazeDiv.innerHTML=""

for(let y=0;y<size;y++){
for(let x=0;x<size;x++){

let cell=document.createElement("div")
cell.classList.add("cell")

if(maze[y][x]===1) cell.classList.add("wall")
else cell.classList.add("path")

if(player.x===x && player.y===y) cell.classList.add("player")

if(goal.x===x && goal.y===y) cell.classList.add("goal")

mazeDiv.appendChild(cell)

}
}

}

function move(dx,dy){

let nx=player.x+dx
let ny=player.y+dy

if(nx>=0 && ny>=0 && nx<size && ny<size){
if(maze[ny][nx]===0){

player.x=nx
player.y=ny

if(player.x===goal.x && player.y===goal.y){

stage++
document.getElementById("stage").textContent=stage

generateMaze()

}

drawMaze()

}
}

}

document.addEventListener("keydown",e=>{

if(e.key==="ArrowUp") move(0,-1)
if(e.key==="ArrowDown") move(0,1)
if(e.key==="ArrowLeft") move(-1,0)
if(e.key==="ArrowRight") move(1,0)

})

generateMaze()
drawMaze()

</script>

</body>
</html>
